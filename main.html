    <style>
        /* Стилі для пошуку */
        .search-container {
            display: flex;
            align-items: center;
            position: relative;
            margin-left: 15px;
        }

        .search-input {
            width: 0;
            padding: 0;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            background: transparent;
            color: #333;
            font-size: 16px;
            outline: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden;
        }

        .search-input.active {
            width: 220px;
            padding: 5px 10px;
            opacity: 1;
            visibility: visible;
            margin-left: 5px;
            border-bottom: 2px solid #4a90e2;
        }

        .search-icon {
            cursor: pointer;
            font-size: 1.4em;
            padding: 5px;
            color: #555;
            transition: color 0.3s;
        }

        .search-icon:hover {
            color: #4a90e2;
            transform: scale(1.1);
        }

        .search-input::placeholder {
            color: rgba(0, 0, 0, 0.3);
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.3px;
        }
    </style>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

    <script type="module">
        import { setupSearchWithTableFilter } from "/src/ts/roboha/tablucya/pochuk.ts";
        import { loadActsTable, initializeActsSystem } from "/src/ts/roboha/tablucya/tablucya.ts";
        import {
            showLoginModalBeforeTable,
            updateUIBasedOnAccess,
            logoutFromSystemAndRedirect
        } from "/src/ts/roboha/tablucya/users.ts";

        window.logoutFromSystemAndRedirect = logoutFromSystemAndRedirect;

        /**
         * Перевірка авторизації (швидка)
         */
        function checkAuthLocal() {
            const storedData = localStorage.getItem("userAuthData");
            if (!storedData) return false;
            try {
                const parsed = JSON.parse(storedData);
                return !!(parsed.Name && parsed.Доступ);
            } catch { return false; }
        }

        /**
         * Функція БЛОКУВАННЯ (викликаємо при кліку)
         */
        function blockActionIfNoAuth(e) {
            if (!checkAuthLocal()) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();

                // 🛑 ТУТ ВИВОДИМО ПОВІДОМЛЕННЯ ПРО БЛОКУВАННЯ
                alert("⛔ Доступ заблоковано. Ви не авторизовані.");

                return true; // Заблоковано
            }
            return false; // Дозволено
        }

        function updateMenuVisibility(isVisible) {
            const menu = document.getElementById("menu-items-to-hide");
            if (menu) {
                menu.style.display = isVisible ? "flex" : "none";
            }
        }

        function updateUserInfoDisplay() {
            try {
                const storedData = localStorage.getItem("userAuthData");
                if (storedData) {
                    const userData = JSON.parse(storedData);
                    const userInfoDiv = document.getElementById('userInfoBlock');
                    const userSurnameElement = document.querySelector('.user-surname');
                    const userAccessElement = document.querySelector('.user-access');

                    if (userSurnameElement) userSurnameElement.textContent = userData.Name;
                    if (userAccessElement) userAccessElement.textContent = userData.Доступ;
                    if (userInfoDiv) userInfoDiv.style.display = 'flex';
                }
            } catch (error) { console.error(error); }
        }

        // --- НАЛАШТУВАННЯ БЛОКУВАННЯ ДЛЯ ПОШУКУ ТА КАЛЕНДАРЯ ---
        function setupBlockers() {
            // 1. Блокуємо ПОШУК


            $('#searchInput').on('focus click keydown', function (e) {
                if (blockActionIfNoAuth(e)) {
                    $(this).blur(); // Прибираємо фокус
                }
            });

            // 2. Блокуємо КАЛЕНДАР
            // Перехоплюємо подію перед відкриттям
            $('#dateRangePicker').on('show.daterangepicker', function (e, picker) {
                if (!checkAuthLocal()) {
                    picker.hide(); // Негайно ховаємо
                    e.preventDefault();
                    alert("⛔ Доступ до календаря заблоковано. Ви не авторизовані.");
                }
            });

            // Блокуємо клік по інпуту календаря
            $('#dateRangePicker').on('click focus', function (e) {
                if (blockActionIfNoAuth(e)) {
                    $(this).blur();
                }
            });
        }

        function initializeSystem() {
            let currentFilterType = 'open';

            // Запускаємо логіку блокувальників
            setupBlockers();

            // Закриття пошуку при кліку поза ним
            $(document).on('click', function (e) {
                if (!$(e.target).closest('.search-container').length) {
                    const input = $('#searchInput');
                    if (input.hasClass('active') && input.val() === '') {
                        input.removeClass('active');
                    }
                }
            });

            // Ініціалізація DateRangePicker
            $('#dateRangePicker').daterangepicker(
                {
                    locale: {
                        format: 'DD.MM.YYYY',
                        separator: ' - ',
                        applyLabel: 'Прийняти',
                        cancelLabel: 'Відмінити',
                        fromLabel: 'Від',
                        toLabel: 'До',
                        weekLabel: 'Тиж',
                        daysOfWeek: ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'],
                        monthNames: ['Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень', 'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'],
                        firstDay: 1
                    },
                    opens: 'center',
                    alwaysShowCalendars: true,
                    autoUpdateInput: false,
                    startDate: moment().startOf('year'),
                    endDate: moment(),
                    ranges: {
                        'Відкриті': [moment().startOf('year'), moment()],
                        'Закриті': [moment('02.01.2025', 'DD.MM.YYYY'), moment()],
                        'Від початку': [moment('03.01.2025', 'DD.MM.YYYY'), moment()],
                        'Сьогодні': [moment(), moment()],
                        'Останні 7 днів': [moment().subtract(6, 'days'), moment()],
                        'Поточний місяць': [moment().startOf('month'), moment().endOf('month')],
                        'Минулий місяць': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')]
                    },
                    showCustomRangeLabel: false
                },
                function (start, end, label) {
                    // Ця функція спрацює тільки якщо календар відкрився (тобто пройшов перевірку)
                    if (label === 'Відкриті') {
                        $('#dateRangePicker').val('Відкриті');
                        $('#dateRangePicker').data('daterangepicker').element.removeClass('active-range');
                        currentFilterType = 'open';
                        loadActsTable(null, null, 'open');
                        this.setStartDate(moment().startOf('year'));
                        this.setEndDate(moment());
                    } else if (label === 'Закриті') {
                        $('#dateRangePicker').val('Закриті');
                        $('#dateRangePicker').data('daterangepicker').element.removeClass('active-range');
                        currentFilterType = 'closed';
                        loadActsTable(null, null, 'closed');
                        this.setStartDate(moment('02.01.2025', 'DD.MM.YYYY'));
                        this.setEndDate(moment());
                    } else {
                        const formatted = `${start.format('DD.MM.YYYY')} - ${end.format('DD.MM.YYYY')}`;
                        $('#dateRangePicker').val(formatted);
                        $('#dateRangePicker').data('daterangepicker').element.addClass('active-range');
                        currentFilterType = 'date_range';
                        loadActsTable(start.format("YYYY-MM-DD 00:00:00"), end.format("YYYY-MM-DD 23:59:59"), null);
                    }
                }
            );

            // Значення за замовчуванням
            $('#dateRangePicker').val('Відкриті');
            currentFilterType = 'open';
            const picker = $('#dateRangePicker').data('daterangepicker');
            if (picker) { picker.setStartDate(moment().startOf('year')); picker.setEndDate(moment()); }

            // Ініціалізація пошуку
            const searchHandler = setupSearchWithTableFilter(
                loadActsTable,
                () => currentFilterType,
                () => {
                    // Тут треба отримати актуальні дати, якщо вибрано діапазон
                    // Для спрощення поки повертаємо null, це доопрацюється в loadActsTable
                    return { dateFrom: null, dateTo: null };
                }
            );
            window.searchHandler = searchHandler;

            initializeActsSystem();

            // ВАЖЛИВО: Меню показуємо, але елементи всередині захищені
            updateMenuVisibility(true);
        }

        window.initializeSystem = initializeSystem;

        async function startAuthenticationAndInit() {
            const accessLevel = await showLoginModalBeforeTable();

            if (accessLevel) {
                await updateUIBasedOnAccess(accessLevel);
                updateUserInfoDisplay();
                initializeSystem();
            } else {
                console.error("❌ Вхід не вдалося здійснити.");
                // Навіть якщо вхід не вдався, ми можемо показати меню (заблоковане), 
                // АБО залишити схованим. 
                // Якщо хочеш, щоб було видно "Закриті" кнопки - розкоментуй рядок нижче:
                // updateMenuVisibility(true); 
                // setupBlockers(); // І обов'язково навісити блокувальники
            }
        }

        startAuthenticationAndInit(); 
    </script>
